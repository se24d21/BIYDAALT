<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Зургийн цомог</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#f2f2f2;
    font-family:Arial, sans-serif;
    padding:30px;
}

/* Container */
.container{
    position:relative;
    max-width:900px;
    margin:auto;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

/* Том зурагнууд */
.mySlides{
    display:none;
}

.mySlides img{
    width:100%;
    height:500px;
    object-fit:cover;
    border-radius:10px;
}

/* Cursor */
.cursor{
    cursor:pointer;
}

/* Prev Next button */
.prev,
.next{
    cursor:pointer;
    position:absolute;
    top:40%;
    width:auto;
    padding:16px;
    margin-top:-50px;
    color:white;
    font-weight:bold;
    font-size:22px;
    border-radius:0 3px 3px 0;
    user-select:none;
    background:rgba(0,0,0,0.5);
    transition:0.3s;
}

/* Next */
.next{
    right:10px;
    border-radius:3px 0 0 3px;
}

/* Prev */
.prev{
    left:10px;
}

/* Hover effect */
.prev:hover,
.next:hover{
    background:rgba(0,0,0,0.8);
}

/* Number text */
.numbertext{
    color:white;
    font-size:14px;
    padding:10px;
    position:absolute;
    top:0;
}

/* Caption */
.caption-container{
    text-align:center;
    background:#222;
    padding:15px;
    color:white;
    margin-top:10px;
    border-radius:10px;
}

/* Thumbnail row */
.row{
    margin-top:15px;
}

.row:after{
    content:"";
    display:table;
    clear:both;
}

/* Thumbnail column */
.column{
    float:left;
    width:16.66%;
    padding:5px;
}

/* Thumbnail image */
.demo{
    opacity:0.6;
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:8px;
    transition:0.3s;
}

.active,
.demo:hover{
    opacity:1;
}

/* Responsive */
@media(max-width:768px){

    .mySlides img{
        height:300px;
    }

    .column{
        width:33.33%;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- 1 -->
    <div class="mySlides">
        <div class="numbertext">1 / 6</div>
        <img src="image/zurag1.jpg">
    </div>

    <!-- 2 -->
    <div class="mySlides">
        <div class="numbertext">2 / 6</div>
        <img src="image/zurag2.jpg">
    </div>

    <!-- 3 -->
    <div class="mySlides">
        <div class="numbertext">3 / 6</div>
        <img src="image/zurag3.jpg">
    </div>

    <!-- 4 -->
    <div class="mySlides">
        <div class="numbertext">4 / 6</div>
        <img src="image/zurag4.jpg">
    </div>

    <!-- 5 -->
    <div class="mySlides">
        <div class="numbertext">5 / 6</div>
        <img src="image/zurag5.jpg">
    </div>

    <!-- 6 -->
    <div class="mySlides">
        <div class="numbertext">6 / 6</div>
        <img src="image/zurag6.jpg">
    </div>

    <!-- Prev Next -->
    <a class="prev" onclick="plusSlides(-1)">❮</a>
    <a class="next" onclick="plusSlides(1)">❯</a>

    <!-- Caption -->
    <div class="caption-container">
        <p id="caption"></p>
    </div>

    <!-- Thumbnail -->
    <div class="row">

        <div class="column">
            <img class="demo cursor"
            src="image/jijig-zurag1.jpg"
            onclick="currentSlide(1)"
            alt="The Woods">
        </div>

        <div class="column">
            <img class="demo cursor"
            src="image/jijig-zurag2.jpg"
            onclick="currentSlide(2)"
            alt="Cinque Terre">
        </div>

        <div class="column">
            <img class="demo cursor"
            src="image/jijig-zurag3.jpg"
            onclick="currentSlide(3)"
            alt="Mountains and Fjords">
        </div>

        <div class="column">
            <img class="demo cursor"
            src="image/jijig-zurag4.jpg"
            onclick="currentSlide(4)"
            alt="Northern Lights">
        </div>

        <div class="column">
            <img class="demo cursor"
            src="image/jijig-zurag5.jpg"
            onclick="currentSlide(5)"
            alt="Nature and Sunrise">
        </div>

        <div class="column">
            <img class="demo cursor"
            src="image/jijig-zurag6.jpg"
            onclick="currentSlide(6)"
            alt="Snowy Mountains">
        </div>

    </div>
</div>

<script>

let slideIndex = 1;
showSlides(slideIndex);

/* Next Prev */
function plusSlides(n){
    showSlides(slideIndex += n);
}

/* Thumbnail click */
function currentSlide(n){
    showSlides(slideIndex = n);
}

/* Main function */
function showSlides(n){

    let i;

    let slides = document.getElementsByClassName("mySlides");

    let dots = document.getElementsByClassName("demo");

    let captionText = document.getElementById("caption");

    if(n > slides.length){
        slideIndex = 1;
    }

    if(n < 1){
        slideIndex = slides.length;
    }

    for(i = 0; i < slides.length; i++){
        slides[i].style.display = "none";
    }

    for(i = 0; i < dots.length; i++){
        dots[i].className =
        dots[i].className.replace(" active", "");
    }

    slides[slideIndex - 1].style.display = "block";

    dots[slideIndex - 1].className += " active";

    captionText.innerHTML =
    dots[slideIndex - 1].alt;
}

</script>

</body>
</html>
