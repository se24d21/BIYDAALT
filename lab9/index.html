<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <title>CV Генератор</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f7f6;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      color: #2c3e50;
    }

    #form-section {
      background: white;
      max-width: 650px;
      margin: 0 auto 40px auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border: 1px solid #e1e4e8;
    }

    #form-section h2 {
      margin-bottom: 20px;
      color: #2563eb;
      font-size: 20px;
      border-left: 4px solid #2563eb;
      padding-left: 10px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 4px;
      font-size: 14px;
      color: #34495e;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; font-family: sans-serif; }

    input.error, select.error, textarea.error { border-color: #e53e3e; background: #fff5f5; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; ring: 2px #2563eb; }

    .error-msg {
      color: #e53e3e;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s;
    }

    button:hover { background: #1d4ed8; }

    #cv-section {
      display: none;
      max-width: 800px;
      margin: 0 auto;
      background: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    .cv-header {
      background: #1e3a5f;
      color: white;
      padding: 40px;
      text-align: center;
    }

    .cv-header h2 { font-size: 32px; text-transform: uppercase; letter-spacing: 2px; }
    .cv-header p { font-size: 18px; margin-top: 5px; color: #cbd5e0; }

    .cv-body { padding: 40px; display: grid; grid-template-columns: 1fr; gap: 30px; }

    .cv-block h3 {
      font-size: 16px;
      color: #2563eb;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .cv-item { margin-bottom: 10px; }
    .cv-label { font-weight: bold; color: #4a5568; margin-right: 5px; }
    .cv-value { color: #2d3748; }

    .content-area {
      line-height: 1.6;
      white-space: pre-line;
      color: #4a5568;
    }

    #btn-row {
      max-width: 800px;
      margin: 20px auto;
      display: none;
      gap: 10px;
    }

    @media print {
      body { background: white; padding: 0; }
      #form-section, #btn-row, h1 { display: none !important; }
      #cv-section { display: block !important; box-shadow: none; width: 100%; }
    }
  </style>
</head>
<body>

<h1>Мэргэжлийн CV Үүсгэгч</h1>

<div id="form-section">
  <h2>Хувийн мэдээлэл</h2>
  <label>Овог нэр</label>
  <input type="text" id="name" placeholder="Жишээ: Болд Батаа">
  <div class="error-msg" id="err-name">Овог нэрээ оруулна уу</div>

  <div style="display: flex; gap: 10px;">
    <div style="flex: 1;">
      <label>Нас</label>
      <input type="text" id="age" placeholder="22">
    </div>
    <div style="flex: 1;">
      <label>Хүйс</label>
      <select id="gender">
        <option value="">-- Сонгоно уу --</option>
        <option value="Эрэгтэй">Эрэгтэй</option>
        <option value="Эмэгтэй">Эмэгтэй</option>
      </select>
    </div>
  </div>

  <label>И-мэйл</label>
  <input type="text" id="email" placeholder="example@mail.com">
  <div class="error-msg" id="err-email">И-мэйл хаягаа оруулна уу</div>

  <label>Утас</label>
  <input type="text" id="phone" placeholder="99112233">

  <h2>Мэргэжлийн мэдээлэл</h2>
  <label>Мэргэжил / Албан тушаал</label>
  <input type="text" id="job-title" placeholder="Жишээ: График дизайнер">
  <div class="error-msg" id="err-job">Мэргэжлээ оруулна уу</div>

  <label>Боловсрол</label>
  <textarea id="edu" placeholder="МУИС - Програм хангамж (2018-2022)"></textarea>

  <label>Ажлын туршлага</label>
  <textarea id="exp" placeholder="Компанийн нэр, гүйцэтгэсэн үүрэг..."></textarea>

  <button onclick="showCV()">CV ҮҮСГЭХ</button>
</div>

<div id="cv-section">
  <div class="cv-header">
    <h2 id="cv-name">-</h2>
    <p id="cv-job-header">-</p>
  </div>

  <div class="cv-body">
    <div class="cv-block">
      <h3>Хувийн мэдээлэл</h3>
      <div class="info-grid">
        <div class="cv-item"><span class="cv-label">Нас:</span><span class="cv-value" id="cv-age">-</span></div>
        <div class="cv-item"><span class="cv-label">Хүйс:</span><span class="cv-value" id="cv-gender">-</span></div>
        <div class="cv-item"><span class="cv-label">И-мэйл:</span><span class="cv-value" id="cv-email">-</span></div>
        <div class="cv-item"><span class="cv-label">Утас:</span><span class="cv-value" id="cv-phone">-</span></div>
      </div>
    </div>

    <div class="cv-block">
      <h3>Боловсрол</h3>
      <div class="content-area" id="cv-edu">-</div>
    </div>

    <div class="cv-block">
      <h3>Ажлын туршлага</h3>
      <div class="content-area" id="cv-exp">-</div>
    </div>
  </div>
</div>

<div id="btn-row">
  <button onclick="goBack()" style="background:#6c757d; flex: 1; margin-top:0;">Засах</button>
  <button onclick="window.print()" style="background:#16a34a; flex: 1; margin-top:0;">Хэвлэх (PDF)</button>
</div>

<script>
  function showCV() {
    const fields = ['name', 'age', 'gender', 'email', 'phone', 'job-title', 'edu', 'exp'];
    let hasError = false;

    document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
    document.querySelectorAll('input, select, textarea').forEach(el => el.classList.remove('error'));

    if (document.getElementById('name').value === "") {
      document.getElementById('err-name').style.display = 'block';
      document.getElementById('name').classList.add('error');
      hasError = true;
    }
    if (document.getElementById('job-title').value === "") {
      document.getElementById('err-job').style.display = 'block';
      document.getElementById('job-title').classList.add('error');
      hasError = true;
    }
    if (document.getElementById('email').value === "" || !document.getElementById('email').value.includes('@')) {
      document.getElementById('err-email').style.display = 'block';
      document.getElementById('email').classList.add('error');
      hasError = true;
    }

    if (hasError) return;

    document.getElementById("cv-name").innerText = document.getElementById("name").value;
    document.getElementById("cv-job-header").innerText = document.getElementById("job-title").value;
    document.getElementById("cv-age").innerText = document.getElementById("age").value;
    document.getElementById("cv-gender").innerText = document.getElementById("gender").value;
    document.getElementById("cv-email").innerText = document.getElementById("email").value;
    document.getElementById("cv-phone").innerText = document.getElementById("phone").value;
    document.getElementById("cv-edu").innerText = document.getElementById("edu").value;
    document.getElementById("cv-exp").innerText = document.getElementById("exp").value;

    document.getElementById("form-section").style.display = "none";
    document.getElementById("cv-section").style.display = "block";
    document.getElementById("btn-row").style.display = "flex";
    window.scrollTo(0,0);
  }

  function goBack() {
    document.getElementById("form-section").style.display = "block";
    document.getElementById("cv-section").style.display = "none";
    document.getElementById("btn-row").style.display = "none";
  }
</script>

</body>
</html>
